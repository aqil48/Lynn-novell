<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 Lynn Novel</title>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<style>

body{
background:#121212;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

h1{
text-align:center;
color:#00ff88;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:12px 16px;
margin:5px;
border:none;
border-radius:10px;
background:#00ff88;
font-weight:bold;
cursor:pointer;
}

#novel{
background:#1e1e1e;
padding:15px;
border-radius:10px;
height:450px;
overflow:auto;
white-space:pre-wrap;
line-height:1.8;
}

.controls{
text-align:center;
margin:15px 0;
}

</style>
</head>

<body>

<h1>📖 Lynn Novel</h1>

<input
type="file"
id="fileInput"
accept=".docx">

<div class="controls">

<button onclick="playNovel()">
▶️ Play
</button>

<button onclick="pauseNovel()">
⏸️ Pause
</button>

<button onclick="resumeNovel()">
▶️ Resume
</button>

<button onclick="stopNovel()">
⏹️ Stop
</button>

</div>

<div id="novel">
Upload file DOCX novel...
</div>

<script>

let novelText = "";

document
.getElementById("fileInput")
.addEventListener("change", async function(e){

const file = e.target.files[0];

if(!file) return;

try{

const buffer =
await file.arrayBuffer();

const result =
await mammoth.extractRawText({
arrayBuffer: buffer
});

novelText = result.value;

document
.getElementById("novel")
.innerText = novelText;

}
catch(error){

alert("Gagal membaca DOCX");

console.log(error);

}

});

function playNovel(){

if(!novelText){

alert("Upload novel DOCX dulu!");

return;

}

speechSynthesis.cancel();

const speech =
new SpeechSynthesisUtterance(
novelText.substring(0,3000)
);

speech.lang = "id-ID";
speech.rate = 1;

speechSynthesis.speak(speech);

}

function pauseNovel(){

speechSynthesis.pause();

}

function resumeNovel(){

speechSynthesis.resume();

}

function stopNovel(){

speechSynthesis.cancel();

}

</script>

</body>
</html>
